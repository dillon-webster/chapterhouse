services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chapterhouse}
      POSTGRES_DB: chapterhouse
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chapterhouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/dillon-webster/chapterhouse:latest
    # To run from source instead of the prebuilt image:
    #   docker compose up -d --build
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-chapterhouse}@db:5432/chapterhouse
      # Optional — auto-generated on first boot (persisted in the storage
      # volume) when left unset.
      AUTH_SECRET: ${AUTH_SECRET:-}
      # Optional — the app trusts the request host, so this is only needed if
      # host detection misbehaves behind your proxy.
      AUTH_URL: ${AUTH_URL:-}
      # Required for NextAuth v5 when running self-hosted behind a proxy.
      AUTH_TRUST_HOST: "true"
      # Optional — colors book spines from covers via Gemini when set.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORAGE_DIR: /data
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Where EPUBs, covers, and avatars live on the host. Point this at a
      # directory with room for your library, e.g. /mnt/external/chapterhouse
      - ${STORAGE_HOST_PATH:-./storage}:/data

volumes:
  db-data:
